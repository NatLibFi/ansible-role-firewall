---

- name: Create directory to store firewall rules
  become: true
  file:
    path: /etc/iptables
    state: directory
    mode: u=rwx,g=rx,o=rx

- name: Install iptables-persistent
  become: true
  package:
    name: iptables-persistent
    state: present

- name: Disable IPv6
  become: true
  sysctl:
    name: "{{ item }}"
    value: "1"
    state: present
    sysctl_set: true
    reload: true
    sysctl_file: /etc/sysctl.d/90-nt-disable-ipv6.conf
  loop:
    - net.ipv6.conf.all.disable_ipv6
    - net.ipv6.conf.default.disable_ipv6
    - net.ipv6.conf.lo.disable_ipv6
